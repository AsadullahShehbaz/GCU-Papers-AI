<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GCU Lahore past papers for all departments — BSCS, BSSE, BSIT, BSAI and more. Free download.">
<meta name="keywords" content="GCU Lahore past papers, GCUL papers, BSCS past papers, GCU exam papers">
<meta name="author" content="GCU Lahore Students">

<!-- Open Graph (for WhatsApp/Facebook preview) -->
<meta property="og:title" content="GCU Lahore Past Papers">
<meta property="og:description" content="All GCU Lahore past papers in one place — free download">
<meta property="og:url" content="https://gculpapersai.vercel.app">
  <title> GCUL Papers AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Google Identity Services (for login) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar">
      <div class="sidebar-logo">📚 GCU Papers</div>

      <div class="sidebar-stats">
        <div class="stat-pill">
          <strong id="statPapers">—</strong>
          <span>Papers</span>
        </div>
        <div class="stat-pill">
          <strong id="statSubjects">—</strong>
          <span>Subjects</span>
        </div>
        <div class="stat-pill">
          <strong id="statSemesters">—</strong>
          <span>Semesters</span>
        </div>
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <div class="main">

      <!-- Topbar -->
      <nav class="topbar">
        <div class="topbar-logo">📚 GCU Papers</div>

        <div class="topbar-links">
          <a href="#">Home</a>
          <a href="#">Papers</a>
          <a href="https://forms.gle/YOUR_FORM_ID" target="_blank">Contribute</a>
        </div>

        <!-- Google Login Button renders here -->
        <div id="authSection">
          <div id="googleBtn"></div>
        </div>
      </nav>

      <!-- Hero -->
      <section class="hero">
       <title>📚 GCU Lahore Past Papers</title>

<h1>GCU Lahore Past <span>Papers</span></h1>
<p>Past papers for all GCU Lahore departments — search, view, download.</p>

        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="text" placeholder="Search subject…" autocomplete="off">
        </div>
      </section>

      <!-- Toolbar -->
      <div class="toolbar">
        <select id="semesterFilter">
          <option value="">All Semesters</option>
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
          <option value="3">Semester 3</option>
          <option value="4">Semester 4</option>
          <option value="5">Semester 5</option>
          <option value="6">Semester 6</option>
          <option value="7">Semester 7</option>
          <option value="8">Semester 8</option>
        </select>

        <select id="deptFilter">
        <option value="">All Departments</option>
        <option value="BSCS">BS Computer Science</option>
        <option value="BSSE">BS Software Engineering</option>
        <option value="BSIT">BS Information Technology</option>
        <option value="BSAI">BS Artificial Intelligence</option>
        <option value="BSMATH">BS Mathematics</option>
        <option value="BSPHY">BS Physics</option>
        <option value="BSCHEM">BS Chemistry</option>
        <option value="BSECON">BS Economics</option>
        <option value="BSENG">BS English</option>
        <option value="BSURDU">BS Urdu</option>
        <option value="BSISL">BS Islamiyat</option>
        <option value="BSSTAT">BS Statistics</option>
        <option value="BSPSYCH">BS Psychology</option>
        <option value="BBA">BBA</option>
        <option value="OTHER">Other</option>
</select>

        <span id="resultCount"></span>
      </div>

      <!-- Papers Grid -->
      <div class="papers-grid" id="papersGrid">
        <p class="state-msg">Loading papers…</p>
      </div>

        <div id="pagination" style="display:flex; justify-content:center; align-items:center; gap:16px; padding:20px 0 60px;"></div>
      <footer>Made with ❤️ for GCUL BSCS students</footer>
    </div>

  </div>

  <!-- ═══ PDF MODAL ═══ -->
  <div class="modal-overlay" id="pdfModal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="pdfTitle">Paper Preview</span>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <iframe id="pdfViewer" src=""></iframe>
    </div>
  </div>

  <!-- ═══ UPLOAD MODAL ═══ -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box modal-box--form">

      <div class="modal-header">
        <span>Upload a Paper</span>
        <button class="modal-close" onclick="closeUploadModal()">✕</button>
      </div>

      <form id="uploadForm" class="upload-form">

        <div class="form-row">
          <label>Subject Name
            <input type="text" name="subject" placeholder="e.g. Computer Networks" required>
          </label>
        </div>

        <div class="form-row form-row--2col">
          <label>Semester
            <select name="semester" required>
              <option value="">Select</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option>
            </select>
          </label>

          <label>Year
            <input type="number" name="year" placeholder="2024" min="2000" max="2099" required>
          </label>
        </div>

        <div class="form-row form-row--2col">
          <label>Paper Type
            <select name="type" required>
              <option value="">Select</option>
              <option value="Mid Term">Mid Term</option>
              <option value="Final Term">Final Term</option>
            </select>
          </label>

          <label>Department
            <select name="department" required>
              <option value="">Select</option>
              <option value="BSCS">BSCS</option>
              <option value="BSSE">BSSE</option>
              <option value="BSIT">BSIT</option>
              <option value="BSAI">BSAI</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>PDF File (max 10MB)
            <input type="file" name="pdfFile" accept=".pdf" required>
          </label>
        </div>

        <p id="uploadStatus" class="upload-status"></p>

        <button type="submit" class="btn btn-download" style="width:100%; padding:14px;">
          Upload Paper
        </button>

      </form>

    </div>
  </div>

  <!-- Scripts — order matters -->
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="upload.js"></script>
  <script src="script.js"></script>

</body>
</html>
