<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Viewer — GCU Lahore</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    /* ── TOPBAR ── */
    .viewer-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 50;
    }

    .viewer-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: color var(--t), border-color var(--t);
      flex-shrink: 0;
    }

    .viewer-back:hover { color: var(--text); border-color: var(--accent); }

    .viewer-info    { flex: 1; min-width: 0; }
    .viewer-subject {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .viewer-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .viewer-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
      transition: border-color var(--t);
    }

    .viewer-btn:hover      { border-color: var(--accent); }
    .viewer-btn--dl        { background: var(--accent); color: #fff; border-color: transparent; }
    .viewer-btn--dl:hover  { opacity: .88; }

    /* ── SPLIT ── */
    .viewer-body {
      display: flex;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    .pdf-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .pdf-panel iframe { flex: 1; width: 100%; border: none; background: #f5f5f5; }

    /* resize handle */
    .resize-handle {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background var(--t);
      position: relative;
      z-index: 10;
    }

    .resize-handle:hover,
    .resize-handle.dragging { background: var(--accent); }

    .resize-handle::after {
      content: '⋮';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    /* ── AI PANEL ── */
    .ai-panel {
      width: 420px;
      min-width: 300px;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      flex-shrink: 0;
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .ai-header-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .ai-header-text h3 { font-family: var(--font-display); font-size: 13px; font-weight: 800; }
    .ai-header-text p  { font-size: 11px; color: var(--muted); }

    /* indexing status badge */
    .index-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
    }

    .index-badge.indexing { color: #f59e0b; border-color: rgba(245,158,11,.3); }
    .index-badge.ready    { color: var(--accent); border-color: rgba(16,163,127,.3); }
    .index-badge.error    { color: #fc8181; border-color: rgba(252,129,129,.3); }

    .index-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .index-badge.indexing .index-dot { animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* messages */
    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* welcome */
    .ai-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
      gap: 12px;
      padding: 20px;
    }

    .ai-welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .ai-welcome h3 { font-family: var(--font-display); font-size: 17px; font-weight: 800; }
    .ai-welcome p  { color: var(--muted); font-size: 12px; line-height: 1.6; max-width: 260px; }

    .ai-chips { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 280px; }

    .ai-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 13px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      transition: border-color var(--t), color var(--t);
      line-height: 1.4;
    }

    .ai-chip:hover { border-color: #6366f1; color: var(--text); }

    /* messages */
    .msg { display: flex; gap: 8px; align-items: flex-start; animation: fadeUp .25s var(--ease) both; }
    .msg--user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .msg--assistant .msg-avatar { background: linear-gradient(135deg,#6366f1,#8b5cf6); }

    .msg-bubble {
      max-width: 88%;
      padding: 9px 13px;
      border-radius: 13px;
      font-size: 13px;
      line-height: 1.65;
    }

    .msg--user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg--assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    .msg-bubble--error {
      background: rgba(229,62,62,.08);
      border: 1px solid rgba(229,62,62,.25);
      color: #fc8181;
      border-radius: 12px;
      padding: 9px 13px;
      font-size: 13px;
    }

    /* markdown */
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em     { font-style: italic; }
    .msg-bubble code   { background: rgba(0,0,0,.25); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; }
    .msg--user .msg-bubble code { background: rgba(255,255,255,.2); }
    .msg-bubble ul, .msg-bubble ol { padding-left: 16px; margin: 5px 0; }
    .msg-bubble li   { margin-bottom: 3px; }
    .msg-bubble p    { margin-bottom: 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble h4   { font-family: var(--font-display); font-weight: 800; font-size: 13px; margin: 8px 0 3px; }

    /* typing */
    .typing-bubble { display:flex; align-items:center; gap:4px; padding:12px 14px; }
    .typing-bubble span { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:bounce .9s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay:.15s; }
    .typing-bubble span:nth-child(3) { animation-delay:.30s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    /* input area */
    .ai-input-area {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .ai-input-row { display: flex; gap: 7px; align-items: flex-end; }

    #aiInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 130px;
      line-height: 1.5;
      transition: border-color var(--t);
    }

    #aiInput:focus { border-color: #6366f1; }
    #aiInput::placeholder { color: var(--muted); }

    .ai-send {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--t), transform var(--t);
    }

    .ai-send:hover             { opacity: .88; transform: scale(1.05); }
    .ai-send:disabled          { opacity: .35; cursor: default; transform: none; }

    .ai-input-hint { font-size: 10px; color: var(--muted); margin-top: 5px; text-align: center; }
    /* ── Table styles inside AI bubble ── */
.msg-bubble table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 12px;
}

.msg-bubble th,
.msg-bubble td {
  border: 1px solid var(--border);
  padding: 7px 10px;
  text-align: left;
  line-height: 1.4;
}

.msg-bubble th {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 700;
  font-family: var(--font-display);
}

.msg-bubble tr:nth-child(even) td {
  background: rgba(255,255,255,.02);
}

.msg-bubble h2, .msg-bubble h3, .msg-bubble h4 {
  font-family: var(--font-display);
  font-weight: 800;
  margin: 12px 0 5px;
  color: var(--text);
}

.msg-bubble h4 { font-size: 13px; }
.msg-bubble h3 { font-size: 14px; }
.msg-bubble h2 { font-size: 15px; }
    /* mobile */
    @media (max-width: 768px) {
      .viewer-body   { flex-direction: column; }
      .pdf-panel     { height: 45vh; flex: none; border-right: none; border-bottom: 1px solid var(--border); }
      .resize-handle { display: none; }
      .ai-panel      { width: 100%; min-width: 0; max-width: none; height: 55vh; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="viewer-topbar">
    <a href="papers.html" class="viewer-back">← Papers</a>
    <div class="viewer-info">
      <div class="viewer-subject" id="topbarSubject">Loading…</div>
      <div class="viewer-meta"   id="topbarMeta"></div>
    </div>
    <div class="viewer-actions">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <a id="downloadBtn" href="#" target="_blank" class="viewer-btn viewer-btn--dl">⬇ Download</a>
    </div>
  </div>

  <!-- BODY -->
  <div class="viewer-body" id="viewerBody">

    <!-- PDF -->
    <div class="pdf-panel" id="pdfPanel">
      <iframe id="pdfFrame" src="" title="Paper PDF"></iframe>
    </div>

    <!-- HANDLE -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- AI -->
    <div class="ai-panel" id="aiPanel">

      <div class="ai-header">
        <div class="ai-header-icon">🤖</div>
        <div class="ai-header-text">
          <h3>RAG Study Assistant</h3>
          <p id="aiHeaderSub">Powered by Groq + Qdrant</p>
        </div>
        <!-- Indexing status -->
        <div class="index-badge indexing" id="indexBadge">
          <div class="index-dot"></div>
          <span id="indexLabel">Indexing…</span>
        </div>
      </div>

      <div class="ai-messages" id="aiMessages"></div>

      <div class="ai-input-area">
        <div class="ai-input-row">
          <textarea
            id="aiInput"
            placeholder="Ask anything about this paper… (Enter to send)"
            rows="1"
            disabled
          ></textarea>
          <button class="ai-send" id="aiSendBtn" onclick="sendMessage()" disabled>↑</button>
        </div>
        <div class="ai-input-hint">Enter to send · Shift+Enter for new line</div>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script>

    // ============================================================
    // URL PARAMS
    // ============================================================
    const params  = new URLSearchParams(window.location.search);
    const pdfUrl  = params.get("pdf")      || "";
    const subject = params.get("subject")  || "Past Paper";
    const dept    = params.get("dept")     || "";
    const sem     = params.get("semester") || "";

    document.getElementById("topbarSubject").textContent = subject;
    document.getElementById("topbarMeta").textContent =
      [dept, sem ? `Semester ${sem}` : ""].filter(Boolean).join(" · ");
    document.getElementById("aiHeaderSub").textContent =
      subject.length > 28 ? subject.slice(0, 28) + "…" : subject;
    document.title = `${subject} — GCU Papers`;

    if (pdfUrl) {
      document.getElementById("pdfFrame").src =
        `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
      document.getElementById("downloadBtn").href = pdfUrl;
    }

    // ============================================================
    // THEME
    // ============================================================
    function toggleTheme() {
      const isLight = document.body.classList.toggle("light");
      localStorage.setItem("theme", isLight ? "light" : "dark");
      document.getElementById("themeBtn").textContent = isLight ? "🌙" : "☀️";
    }

    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light");
      document.getElementById("themeBtn").textContent = "🌙";
    }

    // ============================================================
    // RESIZE HANDLE
    // ============================================================
    const handle   = document.getElementById("resizeHandle");
    const pdfPanel = document.getElementById("pdfPanel");
    const aiPanel  = document.getElementById("aiPanel");
    const body     = document.getElementById("viewerBody");
    let   dragging = false;

    handle.addEventListener("mousedown", () => {
      dragging = true;
      handle.classList.add("dragging");
      document.body.style.userSelect = document.body.style.pointerEvents = "none";
    });

    document.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const rect   = body.getBoundingClientRect();
      const newPdf = e.clientX - rect.left;
      const newAi  = rect.width - newPdf - 5;
      if (newPdf < 280 || newAi < 280) return;
      pdfPanel.style.flex  = "none";
      pdfPanel.style.width = newPdf + "px";
      aiPanel.style.width  = newAi  + "px";
    });

    document.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove("dragging");
      document.body.style.userSelect = document.body.style.pointerEvents = "";
    });

    // ============================================================
    // INDEXING — call backend to index this PDF
    // ============================================================
    async function indexPaper() {
      setIndexStatus("indexing", "Indexing PDF…");

      try {
        const res  = await fetch(`${CONFIG.API_URL}/api/rag/index`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            pdf_url:    pdfUrl,
            subject:    subject,
            department: dept,
            semester:   sem,
          }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Indexing failed");

        const wasAlready = data.status === "already_indexed";
        setIndexStatus("ready", wasAlready ? "Ready" : `Ready · ${data.chunks} chunks`);
        enableInput();
        renderWelcome();

      } catch (err) {
        setIndexStatus("error", "Index failed");
        appendMessage("error", `⚠️ Could not index this paper: ${err.message}`);
        console.error(err);
      }
    }

    function setIndexStatus(state, label) {
      const badge = document.getElementById("indexBadge");
      const lbl   = document.getElementById("indexLabel");
      badge.className = `index-badge ${state}`;
      lbl.textContent = label;
    }

    function enableInput() {
      document.getElementById("aiInput").disabled   = false;
      document.getElementById("aiSendBtn").disabled = false;
      document.getElementById("aiInput").placeholder =
        "Ask anything about this paper… (Enter to send)";
    }

    // ============================================================
    // WELCOME SCREEN
    // ============================================================
    function renderWelcome() {
      document.getElementById("aiMessages").innerHTML = `
        <div class="ai-welcome">
          <div class="ai-welcome-icon">🤖</div>
          <h3>Ask Anything</h3>
          <p>
            I've read <strong>${subject}</strong> and I'm ready to explain
            any question from this paper step by step.
          </p>
          <div class="ai-chips">
            <button class="ai-chip" onclick="fillInput(this)">Explain question 1 step by step</button>
            <button class="ai-chip" onclick="fillInput(this)">What are the key topics in this paper?</button>
            <button class="ai-chip" onclick="fillInput(this)">What formula or concept is tested here?</button>
            <button class="ai-chip" onclick="fillInput(this)">Summarise what I need to study for this exam</button>
          </div>
        </div>
      `;
    }

    function fillInput(el) {
      const input = document.getElementById("aiInput");
      input.value = el.textContent.trim();
      input.focus();
      autoResize(input);
    }

    // ============================================================
    // CHAT
    // ============================================================
    function appendMessage(role, content) {
      const msgs    = document.getElementById("aiMessages");
      const welcome = msgs.querySelector(".ai-welcome");
      if (welcome) welcome.remove();

      const div = document.createElement("div");

      if (role === "user") {
        div.className = "msg msg--user";
        div.innerHTML = `
          <div class="msg-bubble">${escHtml(content)}</div>
          <div class="msg-avatar">👤</div>
        `;
      } else if (role === "assistant") {
        div.className = "msg msg--assistant";
        div.innerHTML = `
          <div class="msg-avatar">🤖</div>
          <div class="msg-bubble" id="streaming-bubble"></div>
        `;
      } else {
        div.innerHTML = `<div class="msg-bubble--error">${content}</div>`;
      }

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function showTyping() {
      const msgs = document.getElementById("aiMessages");
      const div  = document.createElement("div");
      div.className = "msg msg--assistant";
      div.id = "typing-indicator";
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble typing-bubble"><span></span><span></span><span></span></div>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      document.getElementById("typing-indicator")?.remove();
    }

    // ============================================================
    // SEND — calls backend /api/rag/ask and streams response
    // ============================================================
    async function sendMessage() {
      const input   = document.getElementById("aiInput");
      const sendBtn = document.getElementById("aiSendBtn");
      const question = input.value.trim();
      if (!question) return;

      input.value = "";
      autoResize(input);
      sendBtn.disabled = true;

      appendMessage("user", question);
      showTyping();

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/rag/ask`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            pdf_url:    pdfUrl,
            question:   question,
            subject:    subject,
            department: dept,
            semester:   sem,
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Server error ${res.status}`);
        }

        // ── Stream SSE response ──────────────────────────────
        removeTyping();
        const msgDiv   = appendMessage("assistant", "");
        const bubble   = msgDiv.querySelector("#streaming-bubble");
        const msgs     = document.getElementById("aiMessages");

        let rawText    = "";
        const reader   = res.body.getReader();
        const decoder  = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });

          // Parse SSE lines: "data: token\n\n"
          chunk.split("\n").forEach(line => {
            if (!line.startsWith("data: ")) return;
            const token = line.slice(6);
            if (token === "[DONE]") return;
            rawText += token;
            bubble.innerHTML = formatMd(rawText);
            msgs.scrollTop   = msgs.scrollHeight;
          });
        }

      } catch (err) {
        removeTyping();
        appendMessage("error", "⚠️ " + err.message);
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // ============================================================
    // MARKDOWN FORMATTER
    // ============================================================
    function formatMd(text) {
  return text
    // Escape HTML first
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")

    // Headers
    .replace(/^###\s(.+)$/gm, "<h4>$1</h4>")
    .replace(/^##\s(.+)$/gm,  "<h3>$1</h3>")
    .replace(/^#\s(.+)$/gm,   "<h2>$1</h2>")

    // Bold and italic
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,     "<em>$1</em>")

    // Inline code
    .replace(/`([^`\n]+)`/g, "<code>$1</code>")

    // ── Table rendering ──────────────────────────────────────
    // Gemini returns tables with || separators
    // Convert "|| col1 | col2 ||" style rows to HTML table
    .replace(/((?:\|.+\|\n?)+)/g, (match) => {
      const rows = match.trim().split("\n").filter(r => r.trim());
      let html = "<table>";
      rows.forEach((row, i) => {
        // Clean leading/trailing pipes
        const cells = row
          .replace(/^\|+|\|+$/g, "")
          .split("|")
          .map(c => c.trim())
          .filter(c => c && !/^[-\s]+$/.test(c)); // skip divider rows

        if (!cells.length) return;

        const tag  = i === 0 ? "th" : "td";
        const wrap = i === 0 ? "thead" : "tbody";
        html += `<tr>${cells.map(c => `<${tag}>${c}</${tag}>`).join("")}</tr>`;
      });
      html += "</table>";
      return html;
    })

    // Numbered lists
    .replace(/^\d+\.\s(.+)$/gm, "<li>$1</li>")
    // Bullet lists
    .replace(/^[-•*]\s(.+)$/gm, "<li>$1</li>")
    // Wrap consecutive li tags
    .replace(/(<li>.*?<\/li>\n?)+/gs, "<ul>$&</ul>")

    // Paragraphs
    .replace(/\n\n/g, "</p><p>")
    .replace(/\n/g,   "<br>")
    .replace(/^(?!<)/, "<p>")
    .replace(/(?<!>)$/, "</p>")

    // Clean up empty paragraphs
    .replace(/<p><\/p>/g, "")
    .replace(/<p>(<h[2-4]>)/g, "$1")
    .replace(/(<\/h[2-4]>)<\/p>/g, "$1");
}

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ============================================================
    // INPUT HELPERS
    // ============================================================
    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 130) + "px";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("aiInput");
      input.addEventListener("input", () => autoResize(input));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Start indexing when page loads
      if (pdfUrl) indexPaper();
      else {
        setIndexStatus("error", "No PDF URL");
        appendMessage("error", "⚠️ No PDF URL provided.");
      }
    });

  </script>
</body>
</html>
