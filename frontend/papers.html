<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Papers — GCU Lahore</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="shared.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ── LAYOUT ── */
    .page-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 61px);
    }

    @media (max-width: 860px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      position: sticky;
      top: 61px;
      height: calc(100vh - 61px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .sidebar-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .stat-pill {
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stat-pill strong {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
    }

    .stat-pill span { color: var(--muted); font-size: 13px; }

    /* ── MAIN ── */
    .main-col { overflow-x: hidden; }

    /* ── PAGE HERO ── */
    .page-hero {
      padding: 48px 36px 32px;
      border-bottom: 1px solid var(--border);
    }

    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .page-hero h1 span { color: var(--accent); }
    .page-hero p { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

    .search-wrap {
      max-width: 560px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 14px 18px 14px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color var(--t);
    }

    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 36px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      background: var(--surface);
      position: sticky;
      top: 61px;
      z-index: 10;
    }

    .toolbar select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color var(--t);
    }

    .toolbar select:focus { border-color: var(--accent); }

    #resultCount { margin-left: auto; color: var(--muted); font-size: 13px; }

    /* ── GRID ── */
    .papers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      padding: 28px 36px 20px;
    }

    /* ── CARD ── */
    .paper-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: space-between;
      transition: border-color var(--t), transform var(--t);
    }

    .paper-card:hover { border-color: var(--accent-glow); transform: translateY(-3px); }

    .card-top { display: flex; gap: 7px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }

    .badge-sem  { background: var(--accent-dim); color: var(--accent); }
    .badge-year { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .badge-dept { background: rgba(167,139,250,.1); color: #a78bfa; }

    .card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
    }

    .card-type { color: var(--muted); font-size: 13px; }

    .card-buttons { display: flex; gap: 9px; margin-top: 4px; }

    .btn-view     { flex:1; padding:10px; border:none; border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); border:1px solid var(--border); font-family:var(--font-body); font-size:13px; font-weight:600; cursor:pointer; transition:opacity var(--t); }
    .btn-download { flex:1; padding:10px; border:none; border-radius:var(--radius-sm); background:var(--accent); color:#fff; font-family:var(--font-body); font-size:13px; font-weight:600; cursor:pointer; transition:opacity var(--t); }
    .btn-view:hover, .btn-download:hover { opacity: .85; }

    /* ── PAGINATION ── */
    #pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 24px 0 60px;
    }

    .page-info { color: var(--muted); font-size: 14px; }

    /* ── STATE MSG ── */
    .state-msg { color: var(--muted); font-size: 14px; padding: 60px 0; text-align: center; grid-column: 1/-1; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-overlay.active { display: flex; }

    .modal-box {
      width: 96%;
      height: 92vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-box--form {
      height: auto;
      max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-weight: 800;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      transition: color var(--t);
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    #pdfViewer { flex: 1; width: 100%; border: none; background: #fff; }

    /* ── UPLOAD FORM ── */
    .upload-form { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .form-row { display: flex; flex-direction: column; gap: 6px; }
    .form-row--2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .form-row label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .upload-form input,
    .upload-form select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color var(--t);
    }

    .upload-form input:focus,
    .upload-form select:focus { border-color: var(--accent); }

    .upload-status { font-size: 13px; min-height: 20px; text-align: center; }
    .upload-status.success { color: var(--accent); }
    .upload-status.error   { color: var(--danger); }
    .upload-status.loading { color: var(--muted); }

    /* ── AUTH ── */
    #authSection { display: flex; align-items: center; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .user-name { font-size: 14px; color: var(--muted); }
    .btn-upload { background: var(--accent); color: #fff; padding: 9px 18px; border-radius: var(--radius-pill); border: none; font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-signout { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-pill); font-family: var(--font-body); font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">📚 GCU Papers</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="papers.html" class="active">Papers</a>
      <a href="contact.html">Contact</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="authSection"><div id="googleBtn"></div></div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
    </div>
  </nav>

  <div class="page-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-title">Stats</div>
        <div class="stat-pill">
          <strong id="statPapers">—</strong>
          <span>Papers</span>
        </div>
        <div class="stat-pill">
          <strong id="statSubjects">—</strong>
          <span>Subjects</span>
        </div>
        <div class="stat-pill">
          <strong id="statSemesters">—</strong>
          <span>Semesters</span>
        </div>
        <div class="stat-pill">
          <strong id="statDepts">—</strong>
          <span>Departments</span>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main-col">

      <!-- Page Hero -->
      <div class="page-hero">
        <h1>Browse <span>Papers</span></h1>
        <p>Filter by department and semester, or search your subject directly.</p>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="text" placeholder="Search subject…" autocomplete="off">
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <select id="semesterFilter">
          <option value="">All Semesters</option>
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
          <option value="3">Semester 3</option>
          <option value="4">Semester 4</option>
          <option value="5">Semester 5</option>
          <option value="6">Semester 6</option>
          <option value="7">Semester 7</option>
          <option value="8">Semester 8</option>
        </select>

        <select id="deptFilter">
          <option value="">All Departments</option>
          <option value="BSCS">BS Computer Science</option>
          <option value="BSSE">BS Software Engineering</option>
          <option value="BSIT">BS Information Technology</option>
          <option value="BSAI">BS Artificial Intelligence</option>
          <option value="BSMATH">BS Mathematics</option>
          <option value="BSPHY">BS Physics</option>
          <option value="BSCHEM">BS Chemistry</option>
          <option value="BSECON">BS Economics</option>
          <option value="BSENG">BS English</option>
          <option value="BSURDU">BS Urdu</option>
          <option value="BSSTAT">BS Statistics</option>
          <option value="BSPSYCH">BS Psychology</option>
          <option value="BBA">BBA</option>
          <option value="OTHER">Other</option>
        </select>

        <span id="resultCount"></span>
      </div>

      <!-- Papers Grid -->
      <div class="papers-grid" id="papersGrid">
        <p class="state-msg">Loading papers…</p>
      </div>

      <!-- Pagination -->
      <div id="pagination"></div>

      <footer class="footer" style="border-top: 1px solid var(--border);">
        <div class="footer-logo">📚 GCU Papers</div>
        <p>Made with ❤️ for GCU Lahore students</p>
      </footer>

    </div>
  </div>

  <!-- PDF MODAL -->
  <div class="modal-overlay" id="pdfModal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="pdfTitle">Paper Preview</span>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <iframe id="pdfViewer" src=""></iframe>
    </div>
  </div>

  <!-- UPLOAD MODAL -->
  <div class="modal-overlay" id="uploadModal" style="z-index:1000;">
    <div class="modal-box modal-box--form">
      <div class="modal-header">
        <span>Upload a Paper</span>
        <button class="modal-close" onclick="closeUploadModal()">✕</button>
      </div>
      <form id="uploadForm" class="upload-form">
        <div class="form-row">
          <label>Subject Name
            <input type="text" name="subject" placeholder="e.g. Computer Networks" required>
          </label>
        </div>
        <div class="form-row form-row--2col">
          <label>Semester
            <select name="semester" required>
              <option value="">Select</option>
              <option value="1">1</option><option value="2">2</option>
              <option value="3">3</option><option value="4">4</option>
              <option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option>
            </select>
          </label>
          <label>Year
            <input type="number" name="year" placeholder="2024" min="2000" max="2099" required>
          </label>
        </div>
        <div class="form-row form-row--2col">
          <label>Paper Type
            <select name="type" required>
              <option value="">Select</option>
              <option value="Mid Term">Mid Term</option>
              <option value="Final Term">Final Term</option>
            </select>
          </label>
          <label>Department
            <select name="department" required>
              <option value="">Select</option>
              <option value="BSCS">BS Computer Science</option>
              <option value="BSSE">BS Software Engineering</option>
              <option value="BSIT">BS Information Technology</option>
              <option value="BSAI">BS Artificial Intelligence</option>
              <option value="BSMATH">BS Mathematics</option>
              <option value="BSPHY">BS Physics</option>
              <option value="BSCHEM">BS Chemistry</option>
              <option value="BSECON">BS Economics</option>
              <option value="BSENG">BS English</option>
              <option value="BSURDU">BS Urdu</option>
              <option value="BSSTAT">BS Statistics</option>
              <option value="BSPSYCH">BS Psychology</option>
              <option value="BBA">BBA</option>
              <option value="OTHER">Other</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>PDF File (max 10MB)
            <input type="file" name="pdfFile" accept=".pdf" required>
          </label>
        </div>
        <p id="uploadStatus" class="upload-status"></p>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; justify-content:center;">
          Upload Paper
        </button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="upload.js"></script>
  <script src="script.js"></script>

</body>
</html>
